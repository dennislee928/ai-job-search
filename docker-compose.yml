services:
  # Relational Database
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin}
      POSTGRES_DB: ${POSTGRES_DB:-ai_job_search}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    restart: unless-stopped

  # Caching and Message Broker
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app_network
    restart: unless-stopped

  # Vector Database for Semantic Search
  qdrant:
    image: qdrant/qdrant:v1.7.0
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - app_network
    restart: unless-stopped

  # Object Storage (S3 Compatible)
  minio:
    image: minio/minio:RELEASE.2023-11-20T22-40-07Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-admin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - app_network
    restart: unless-stopped

  # Graph Database
  neo4j:
    image: neo4j:5.14.0
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/admin1234}
    ports:
      - "7474:7474" # HTTP Browser
      - "7687:7687" # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - app_network
    restart: unless-stopped
  # Application Services
  api-gateway:
    build:
      context: ./backend/api-gateway
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://admin:admin@postgres:5432/ai_job_search?sslmode=disable
      PORT: 8080
    depends_on:
      - postgres
      - redis
    networks:
      - app_network
    restart: unless-stopped

  ai-service:
    build:
      context: ./backend/ai-service
    ports:
      - "8000:8000"
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: http://minio:9000
    depends_on:
      - qdrant
      - redis
      - minio
    networks:
      - app_network
    restart: unless-stopped

  data-service:
    build:
      context: ./backend/data-service
    ports:
      - "8001:8001"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: admin1234
    depends_on:
      - neo4j
    networks:
      - app_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    networks:
      - app_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data:
  neo4j_data:
  neo4j_logs:

networks:
  app_network:
    driver: bridge
