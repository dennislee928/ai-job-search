basePath: /
host: localhost:8080
info:
  contact: {}
  description: The core routing and authentication service for the AI Job Search platform.
  title: AI Job Search API Gateway
  version: "1.0"
paths:
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user and returns a token
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: User Login
      tags:
      - Auth
  /api/v1/auth/profile:
    get:
      description: Returns the profile of the authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get Profile
      tags:
      - Auth
swagger: "2.0"
